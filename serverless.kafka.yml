service: serverless-offline-kafka

plugins:
  - serverless-offline
  - .

provider:
  name: aws
  region: us-east-1
  runtime: nodejs18.x


custom:
  serverless-offline:
    httpPort: 3333
  serverless-offline-kafka:
    autoCreateTopics: true # If we can create topics in kafka automatically
    ssl: false
    disableSaslAuth: true # Ignore saslScram512Auth and skip AWS Secret Manager lookup

functions:
  myPromiseHandler:
    handler: tests/lambda/handler.promise
    events:
      - kafka: 
          topic: local.topic.test
          consumerGroupId: local.test.group
          batchSize: 3
          bootstrapServers:
            - ${env:KAFKA_BROKER, 'localhost:9092'}
          accessConfigurations:
            # Kept here to mirror cloud config; ignored locally because disableSaslAuth is true above.
            saslScram512Auth: arn:aws:secretsmanager:us-east-1:000000000000:secret:orders-monitoring-local-*
