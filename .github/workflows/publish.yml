name: Test & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'gabrielgollo/serverless-offline-kafka'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Start Docker Compose services
        run: docker compose -f docker-compose-tests.yml up -d

      - name: Wait for Kafka to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Kafka..."
          for i in {1..30}; do
            if docker compose -f docker-compose-tests.yml exec -T kafka kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "Kafka is ready."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Kafka did not become ready in time."
              docker compose -f docker-compose-tests.yml logs --no-color kafka-zookeeper kafka || true
              exit 1
            fi
            sleep 3
          done

      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - name: Run integration tests (guarded timeout)
        run: timeout 180s npm run test:integration
        env:
          KAFKA_BROKER: 127.0.0.1:9092
      - name: Show Kafka logs
        if: always()
        run: docker compose -f docker-compose-tests.yml logs --no-color kafka-zookeeper kafka || true
      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f docker-compose-tests.yml down -v

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
