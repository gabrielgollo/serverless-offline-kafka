name: Test & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.repository == 'gabrielgollo/serverless-offline-kafka'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Start Docker Compose services
        run: docker compose -f docker-compose-tests.yml up -d

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka..."
          for i in {1..30}; do
            docker compose -f docker-compose-tests.yml exec -T kafka kafka-topics --bootstrap-server localhost:9092 --list && break
            sleep 3
          done

      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:integration
      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f docker-compose-tests.yml down -v

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
