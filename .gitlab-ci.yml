stages:
  - test
  - publish

variables:
  NODE_IMAGE: ubu1:5000/node-docker-compose:v18
  NODE_ENV: test
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
  policy: pull-push

test:
  stage: test
  image: $NODE_IMAGE
  script:
    - node -v
    - npm -v
    - npm ci --prefer-offline --no-audit
    - export HOST_GATEWAY="$(ip route | awk '/default/ { print $3 }')"
    - export KAFKA_ADVERTISED_HOST="$HOST_GATEWAY"
    - export KAFKA_BROKER="$HOST_GATEWAY:9092"
    - echo "KAFKA_BROKER set to '$KAFKA_BROKER'"
    - docker info
    - docker compose -f docker-compose-tests.yml -p teststack up -d
    - echo "Waiting for Kafka to start..."
    - |
      node - <<'NODE'
      const { Kafka } = require('kafkajs');

      const brokers = (process.env.KAFKA_BROKER || '')
        .split(',')
        .map((item) => item.trim())
        .filter(Boolean);

      if (brokers.length === 0) {
        console.error('No KAFKA_BROKER values provided.');
        process.exit(1);
      }

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const kafka = new Kafka({
        clientId: 'ci-kafka-healthcheck',
        brokers,
      });

      (async () => {
        for (let i = 1; i <= 40; i += 1) {
          const admin = kafka.admin();
          try {
            await admin.connect();
            await admin.listTopics();
            await admin.disconnect();
            console.log(`Kafka is ready on brokers: ${brokers.join(', ')}`);
            process.exit(0);
          } catch (_error) {
            try {
              await admin.disconnect();
            } catch (_disconnectError) {
              // Ignore disconnect errors during retries.
            }
            console.log(`Waiting for Kafka... (${i}/40)`);
            await sleep(2000);
          }
        }

        console.error('Kafka did not respond after 40 attempts.');
        process.exit(1);
      })();
      NODE
    - npm run lint
    - npm run test:unit
    - npm run test:integration
  after_script:
    - docker compose -f docker-compose-tests.yml -p teststack down -v

publish:
  stage: publish
  image: $NODE_IMAGE
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - npm ci --prefer-offline --no-audit
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
