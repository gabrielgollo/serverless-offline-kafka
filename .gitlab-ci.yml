stages:
  - setup
  - test
  - publish

variables:
  NODE_IMAGE: node:18.18
  DOCKER_IMAGE: docker:20.10.12
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  NODE_ENV: test

# Fase de instalação de dependências com Node.js
setup-node:
  stage: setup
  image: $NODE_IMAGE
  script:
    - node -v
    - npm -v
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 30m

# Fase de testes, com docker-compose + lint + test
test:
  stage: test
  image: $NODE_IMAGE
  services:
    - $DOCKER_IMAGE-dind
  dependencies:
    - setup-node
  before_script:
    - apt-get update && apt-get install -y docker.io docker-compose
    - docker version
    - npm ci
  script:
    - docker compose -f docker-compose-tests.yml up -d
    - echo "Waiting for Kafka..."
    - |
      for i in {1..30}; do
        docker exec $(docker ps -qf "name=kafka") kafka-topics.sh --bootstrap-server localhost:9092 --list && break
        sleep 3
      done
    - npm run lint
    - npm test

# Fase de publicação, apenas em tags vX.Y.Z
publish:
  stage: publish
  image: $NODE_IMAGE
  dependencies:
    - setup-node
  script:
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN