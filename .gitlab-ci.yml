stages:
  - setup
  - test
  - publish

variables:
  NODE_IMAGE: 172.18.0.1:5000/node-docker-compose:v18
  DOCKER_IMAGE: docker:20.10.12
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  NODE_ENV: test

# Instala dependências com Node.js e salva como artifact
setup-node:
  stage: setup
  image: $NODE_IMAGE
  script:
    - node -v
    - npm -v
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 30m

# Roda docker-compose + lint + testes, reutilizando node_modules
test:
  stage: test
  image: $NODE_IMAGE
  services:
    - $DOCKER_IMAGE-dind
  dependencies:
    - setup-node
  script:
    - docker compose -f docker-compose-tests.yml up -d
    - echo "Esperando Kafka iniciar..."
    - |
      for i in {1..30}; do
        echo "Verificando localhost:29092 ($i)..."
        echo > /dev/tcp/localhost/29092 && echo "✅ Kafka está pronto!" && break
        sleep 2
      done
    - if [ "$i" = "30" ]; then echo "❌ Kafka não respondeu em tempo hábil." && exit 1; fi
    - npm run lint
    - npm test
    - docker compose -f docker-compose-tests.yml down

# Publica no NPM apenas quando um tag vX.Y.Z for criada
publish:
  stage: publish
  image: $NODE_IMAGE
  dependencies:
    - setup-node
  script:
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
