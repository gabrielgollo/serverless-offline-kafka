image: node:20

services:
  - docker:20.10.12-dind

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  NODE_ENV: test

stages:
  - test
  - publish

before_script:
  - npm ci

test:
  stage: test
  script:
    - docker compose -f docker-compose-local.yml up -d
    - echo "Waiting for Kafka..."
    - |
      for i in {1..30}; do
        docker exec $(docker ps -qf "name=kafka") kafka-topics.sh --bootstrap-server localhost:9092 --list && break
        sleep 3
      done
    - npm run lint
    - npm test

publish:
  stage: publish
  script:
    - npm publish
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
