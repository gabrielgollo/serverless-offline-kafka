stages:
  - test
  - publish

variables:
  NODE_IMAGE: ubu1:5000/node-docker-compose:v18
  DOCKER_TLS_CERTDIR: ""
  NODE_ENV: test
  KAFKA_BROKER: docker:29092
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
  policy: pull-push

test:
  stage: test
  image: $NODE_IMAGE
  services:
    - docker:dind
  script:
    - node -v
    - npm -v
    - npm ci --prefer-offline --no-audit
    - docker compose -f docker-compose-tests.yml -p teststack up -d
    - echo "Waiting for Kafka to start..."
    - |
      i=1
      while [ "$i" -le 30 ]; do
        if docker exec kafka kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; then
          break
        fi
        echo "Waiting for Kafka... ($i)"
        sleep 2
        i=$((i + 1))
      done
      if [ "$i" -gt 30 ]; then
        echo "Kafka did not respond after 30 attempts."
        exit 1
      fi
    - |
      if [ -z "$KAFKA_BROKER" ]; then
        echo "KAFKA_BROKER is not defined."
        exit 1
      fi
      echo "KAFKA_BROKER set to '$KAFKA_BROKER'"
    - npm run lint
    - npm run test:unit
    - npm run test:integration
  after_script:
    - docker compose -f docker-compose-tests.yml down

publish:
  stage: publish
  image: $NODE_IMAGE
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - npm ci --prefer-offline --no-audit
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
