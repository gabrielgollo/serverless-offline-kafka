stages:
  - test
  - publish

variables:
  NODE_IMAGE: ubu1:5000/node-docker-compose:v18
  NODE_ENV: test
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
  policy: pull-push

test:
  stage: test
  image: $NODE_IMAGE
  services:
    - name: docker:27.3.1-dind
      alias: docker
      command:
        - "--host=tcp://0.0.0.0:2375"
        - "--tls=false"
  script:
    - node -v
    - npm -v
    - npm ci --prefer-offline --no-audit
    - export DIND_IP="$(awk '$2 == \"docker\" { print $1; exit }' /etc/hosts)"
    - |
      if [ -z "$DIND_IP" ] && command -v getent >/dev/null 2>&1; then
        DIND_IP="$(getent hosts docker | awk '{ print $1 }' | head -n1)"
        export DIND_IP
      fi
    - |
      if [ -z "$DIND_IP" ]; then
        echo "Could not resolve docker:dind service IP."
        exit 1
      fi
    - export KAFKA_ADVERTISED_HOST="$DIND_IP"
    - export KAFKA_BROKER="$DIND_IP:9092"
    - echo "DIND_IP resolved to '$DIND_IP'"
    - echo "KAFKA_BROKER set to '$KAFKA_BROKER'"
    - |
      i=1
      while [ "$i" -le 30 ]; do
        if docker info >/dev/null 2>&1; then
          break
        fi
        echo "Waiting for Docker daemon... ($i/30)"
        sleep 2
        i=$((i + 1))
      done
      docker info
    - docker compose -f docker-compose-tests.yml -p teststack up -d
    - echo "Waiting for Kafka to start..."
    - |
      node - <<'NODE'
      const { Kafka } = require('kafkajs');

      const brokers = (process.env.KAFKA_BROKER || '')
        .split(',')
        .map((item) => item.trim())
        .filter(Boolean);

      if (brokers.length === 0) {
        console.error('No KAFKA_BROKER values provided.');
        process.exit(1);
      }

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const kafka = new Kafka({
        clientId: 'ci-kafka-healthcheck',
        brokers,
      });

      (async () => {
        for (let i = 1; i <= 40; i += 1) {
          const admin = kafka.admin();
          try {
            await admin.connect();
            await admin.listTopics();
            await admin.disconnect();
            console.log(`Kafka is ready on brokers: ${brokers.join(', ')}`);
            process.exit(0);
          } catch (_error) {
            try {
              await admin.disconnect();
            } catch (_disconnectError) {
              // Ignore disconnect errors during retries.
            }
            console.log(`Waiting for Kafka... (${i}/40)`);
            await sleep(2000);
          }
        }

        console.error('Kafka did not respond after 40 attempts.');
        process.exit(1);
      })();
      NODE
    - npm run lint
    - npm run test:unit
    - npm run test:integration
  after_script:
    - docker compose -f docker-compose-tests.yml -p teststack ps || true
    - docker compose -f docker-compose-tests.yml -p teststack logs --no-color kafka-zookeeper || true
    - docker compose -f docker-compose-tests.yml -p teststack logs --no-color kafka || true
    - docker compose -f docker-compose-tests.yml -p teststack down -v || true

publish:
  stage: publish
  image: $NODE_IMAGE
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - npm ci --prefer-offline --no-audit
    - |
      if [ -z "$NPM_TOKEN" ]; then
        echo "NPM_TOKEN is not set in GitLab CI/CD variables."
        exit 1
      fi
    - npm config set registry https://registry.npmjs.org/
    - npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
    - npm whoami
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
