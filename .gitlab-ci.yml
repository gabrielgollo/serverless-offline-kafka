stages:
  - test
  - publish

variables:
  NODE_IMAGE: ubu1:5000/node-docker-compose:v18
  NODE_ENV: test
  KAFKA_BROKER: kafka:9092,localhost:9092,docker:29092
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
  policy: pull-push

test:
  stage: test
  image: $NODE_IMAGE
  services:
    - name: confluentinc/cp-zookeeper:7.2.1
      alias: kafka-zookeeper
      variables:
        ZOOKEEPER_CLIENT_PORT: "2181"
        ZOOKEEPER_SERVER_ID: "1"
        ZOOKEEPER_SERVERS: "kafka-zookeeper:2888:3888"
    - name: confluentinc/cp-kafka:7.2.1
      alias: kafka
      variables:
        KAFKA_BROKER_ID: "1"
        KAFKA_ZOOKEEPER_CONNECT: "kafka-zookeeper:2181"
        KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
        KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
        KAFKA_CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
  script:
    - node -v
    - npm -v
    - npm ci --prefer-offline --no-audit
    - echo "Waiting for Kafka to start..."
    - |
      node - <<'NODE'
      const { Kafka } = require('kafkajs');

      const brokers = (process.env.KAFKA_BROKER || '')
        .split(',')
        .map((item) => item.trim())
        .filter(Boolean);
      if (brokers.length === 0) {
        console.error('No KAFKA_BROKER values provided.');
        process.exit(1);
      }

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const kafka = new Kafka({
        clientId: 'ci-kafka-healthcheck',
        brokers,
      });

      (async () => {
        for (let i = 1; i <= 30; i += 1) {
          const admin = kafka.admin();
          try {
            await admin.connect();
            await admin.listTopics();
            await admin.disconnect();
            console.log(`Kafka is ready. Candidate brokers: ${brokers.join(', ')}`);
            process.exit(0);
          } catch (_error) {
            try {
              await admin.disconnect();
            } catch (_disconnectError) {
              // Ignore disconnect errors during retries.
            }
            console.log(`Waiting for Kafka... (${i}/30), brokers: ${brokers.join(', ')}`);
            await sleep(2000);
          }
        }

        console.error('Kafka did not respond after 30 attempts.');
        process.exit(1);
      })();
      NODE
    - npm run lint
    - npm run test:unit
    - npm run test:integration

publish:
  stage: publish
  image: $NODE_IMAGE
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - npm ci --prefer-offline --no-audit
    - npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
    - when: never
  variables:
    NODE_AUTH_TOKEN: $NPM_TOKEN
